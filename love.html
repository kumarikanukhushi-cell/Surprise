<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 A Message For You 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff69b4;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            50% { opacity: 0.7; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 3rem 2rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            max-width: 500px;
            backdrop-filter: blur(10px);
            animation: slideIn 1s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .title {
            font-size: 2.5rem;
            color: #ff6b9d;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }

        .message {
            font-size: 1.3rem;
            color: #333;
            line-height: 1.6;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1s ease-out 0.5s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .love-note {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            padding: 1.5rem;
            border-radius: 20px;
            margin: 2rem 0;
            box-shadow: 0 10px 30px rgba(255, 107, 157, 0.3);
            transform: scale(0);
            animation: popIn 1s ease-out 1s forwards;
            position: relative;
            overflow: hidden;
        }

        .love-note::before {
            content: '💌';
            position: absolute;
            font-size: 3rem;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes popIn {
            to {
                transform: scale(1);
            }
        }

        .emoji-row {
            font-size: 2rem;
            margin: 1rem 0;
            animation: wiggle 2s ease-in-out infinite 1.5s;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        @media (max-width: 480px) {
            .title { font-size: 2rem; }
            .message { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container">
        <h1 class="title">💖 Surprise! 💖</h1>
        <div class="emoji-row">✨💕🌸💫</div>
        
        <div class="message">
            I love you so much, and this distance feels unbearable sometimes—<br>
            <strong>I miss you more than words can ever say.</strong> 💕
        </div>
        
        <div class="love-note">
            <p style="font-size: 1.1rem; font-weight: 600; color: #fff; margin-top: 1rem;">
                Can't wait to hold you close again! 🥰
            </p>
        </div>
        
        <div style="font-size: 1rem; color: #666;">
            Click anywhere to make more hearts! 💖
        </div>
    </div>

    <script>
        // Floating hearts background
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['💖', '💕', '💗', '💓', '💞'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            document.getElementById('hearts').appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        // Create hearts continuously
        setInterval(createHeart, 300);

        // Click to create extra hearts
        document.addEventListener('click', function(e) {
            for(let i = 0; i < 5; i++) {
                setTimeout(createHeart, i * 100);
            }
        });

        // Add sparkle effect on load
        window.addEventListener('load', () => {
            document.querySelector('.container').style.animation = 'slideIn 1s ease-out, sparkle 2s ease-in-out 1s infinite';
        });
    </script>
</body>
</html>
